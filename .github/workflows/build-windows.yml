name: Build and Publish Standalone Windows

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Standalone (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure with CMake (use default generator)
        run: |
          mkdir -p build
          cmake -S . -B build -A x64 -DCMAKE_BUILD_TYPE=Release

      - name: Build Release
        run: |
          cmake --build build --config Release

      - name: Upload build artifact (search for exe)
        uses: actions/upload-artifact@v4
        with:
          name: skinchanger-exe
          path: build/**/skinchanger.exe

      - name: Create GitHub Release and upload exe (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          files: build/**/skinchanger.exe
